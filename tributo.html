<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>tributo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0b0b0b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    font-family:'Cinzel',serif;
    gap:28px;
}
#estrella-img{
    width:120px;
    height:120px;
    object-fit:contain;
    cursor:pointer;
    animation:pulsar-estrella 2.5s ease-in-out infinite;
    filter:brightness(0.75);
    transition:filter 0.3s;
}
#estrella-img:hover{
    filter:brightness(1.2) drop-shadow(0 0 18px rgba(255,240,150,0.6));
}
@keyframes pulsar-estrella{
    0%,100%{transform:scale(1);opacity:0.8;}
    50%{transform:scale(1.08);opacity:1;}
}
.etiqueta{
    font-size:0.7rem;
    color:#332211;
    letter-spacing:4px;
    text-align:center;
}
.click-hint{
    font-family:monospace;
    font-size:0.65rem;
    color:#2a1a0a;
    letter-spacing:2px;
    animation:parpadeo 3s infinite;
}
@keyframes parpadeo{0%,100%{opacity:0.6;}50%{opacity:0.2;}}
</style>
</head>
<body>
<audio id="audio-inner" src="Inner_Channel_Zone.mp3" loop autoplay></audio>

<p class="etiqueta">XVII — LA ESTRELLA</p>
<img src="estrella-blanca.png" id="estrella-img" alt="La Estrella" onclick="irAlJuego()">
<p class="click-hint">[ haz click ]</p>

<script>
document.addEventListener('click', () => {
    const a = document.getElementById('audio-inner');
    if (a.paused) a.play();
}, { once: true });

function irAlJuego() {
    // Redirige al index con parámetro para abrir el minijuego
    window.location.href = 'index.html?juego=1';
}
</script>
</body>
</html>
